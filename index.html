<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redhawk Hydration Challenge</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  #app { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem; }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .header h1 { font-size: 26px; font-weight: 600; line-height: 1.2; }
  .header p { font-size: 14px; color: #5f5e5a; margin-top: 4px; }
  .tabs { display: inline-flex; gap: 8px; margin-top: 12px; }
  .tab { padding: 6px 16px; border-radius: 8px; font-size: 14px; border: 0.5px solid rgba(0,0,0,0.12); background: transparent; color: #5f5e5a; cursor: pointer; }
  .tab.active { background: #e6f1fb; color: #185fa5; border-color: rgba(24,95,165,0.35); font-weight: 500; }
  .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
  .card.highlight { background: #e6f1fb; border-color: rgba(24,95,165,0.35); }
  .join-card { text-align: center; padding: 2rem; }
  .join-card .icon { font-size: 44px; margin-bottom: 8px; }
  .join-card h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  .join-card p { font-size: 14px; color: #5f5e5a; margin-bottom: 24px; }
  input[type="text"] { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.18); font-size: 15px; margin-bottom: 8px; outline: none; font-family: inherit; }
  .btn-join { width: 100%; padding: 10px; border-radius: 8px; font-size: 15px; background: #e6f1fb; color: #185fa5; border: 0.5px solid rgba(24,95,165,0.35); font-weight: 500; cursor: pointer; }
  .btn-refresh { font-size: 13px; color: #185fa5; background: transparent; border: 0.5px solid rgba(24,95,165,0.35); border-radius: 6px; padding: 4px 10px; cursor: pointer; }
  .btn-switch { font-size: 13px; color: #5f5e5a; background: transparent; border: none; text-decoration: underline; cursor: pointer; display: block; margin: 12px auto 0; }
  .error { color: #a32d2d; font-size: 13px; margin-bottom: 8px; }
  .profile-row { display: flex; align-items: center; gap: 12px; }
  .profile-info { flex: 1; }
  .profile-info .name { font-weight: 500; font-size: 15px; }
  .profile-info .meta { font-size: 13px; color: #5f5e5a; }
  .badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; }
  .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .day-label { font-size: 14px; font-weight: 500; }
  .day-meta { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #5f5e5a; }
  .goal-met { font-size: 12px; color: #1d9e75; font-weight: 500; }
  .progress-bar { height: 6px; background: #f1efe8; border-radius: 3px; margin-bottom: 12px; }
  .progress-fill { height: 6px; border-radius: 3px; transition: width 0.3s; }
  .dots-row { display: flex; align-items: center; gap: 8px; }
  .dots { flex: 1; display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
  .dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 0.5px solid rgba(0,0,0,0.12); background: #f1efe8; transition: background 0.15s; }
  .btn-inc { width: 32px; height: 32px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.18); background: transparent; font-size: 18px; cursor: pointer; color: #1a1a1a; }
  .btn-inc:disabled { color: #ccc; cursor: default; }
  .lb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .lb-header span { font-size: 15px; font-weight: 500; }
  .lb-row { display: flex; align-items: center; gap: 10px; }
  .lb-rank { font-size: 18px; width: 28px; text-align: center; }
  .lb-rank.num { font-size: 13px; color: #5f5e5a; }
  .lb-info { flex: 1; }
  .lb-name { font-size: 14px; font-weight: 500; }
  .lb-days { display: flex; gap: 3px; margin-top: 4px; }
  .lb-day { width: 20px; height: 20px; border-radius: 4px; border: 0.5px solid rgba(0,0,0,0.1); }
  .lb-total { text-align: right; }
  .lb-total .num { font-size: 18px; font-weight: 500; }
  .lb-total .lbl { font-size: 11px; color: #5f5e5a; }
  .lb-bar { margin-top: 8px; height: 4px; background: #f1efe8; border-radius: 2px; }
  .lb-bar-fill { height: 4px; border-radius: 2px; }
  .legend { margin-top: 12px; text-align: center; font-size: 12px; color: #888780; }
  .footer { margin-top: 2rem; border-top: 0.5px solid rgba(0,0,0,0.1); padding-top: 1rem; text-align: center; font-size: 12px; color: #888780; }
  .toast { position: fixed; top: 16px; right: 16px; background: #1d9e75; color: #fff; padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; z-index: 999; display: none; }
  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 500; flex-shrink: 0; }
  .loading { text-align: center; padding: 2rem; color: #5f5e5a; font-size: 14px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Redhawk Hydration Challenge</h1>
    <p>April 14–18 · Marshall Public Schools · Goal: 8 glasses/day</p>
    <div class="tabs">
      <button class="tab active" onclick="switchView('log')">My Log</button>
      <button class="tab" onclick="switchView('leaderboard')">Leaderboard</button>
    </div>
  </div>
  <div id="view-log"></div>
  <div id="view-leaderboard" class="hidden"></div>
  <div class="footer">Marshall Public Schools · #TheRedhawkWay · April 14–18, 2025</div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://mnmdwhznkbtcijkekcya.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ubWR3aHpua2J0Y2lqa2VrY3lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTYwMjcsImV4cCI6MjA5MTI3MjAyN30.XhtCahSS7ssaH-WRqIMtsWS56IQatj2VpvcyuDF3cHw";
const HEADERS = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY };
const DAYS = [
  { key: "mon", label: "Mon 4/14" },
  { key: "tue", label: "Tue 4/15" },
  { key: "wed", label: "Wed 4/16" },
  { key: "thu", label: "Thu 4/17" },
  { key: "fri", label: "Fri 4/18" },
];
const GOAL = 8;
const BADGES = [
  { threshold: 40, label: "Hydration Hero",    color: "#0f6e56", bg: "#e1f5ee" },
  { threshold: 32, label: "Redhawk Reservoir", color: "#185fa5", bg: "#e6f1fb" },
  { threshold: 24, label: "Steady Sipper",      color: "#854f0b", bg: "#faeeda" },
  { threshold: 1,  label: "Getting Started",    color: "#5f5e5a", bg: "#f1efe8" },
];
const AVATAR_COLORS = ["#1d9e75","#185fa5","#ba7517","#993556","#534ab7","#d85a30"];

let currentView = "log";
let userName = localStorage.getItem("redhawk-username") || "";
let myRow = {};

function getTotal(row) { return DAYS.reduce((s, d) => s + (Number(row[d.key]) || 0), 0); }
function getBadge(total) { return BADGES.find(b => total >= b.threshold) || null; }
function getInitials(name) { return name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0, 2); }
function avatarColor(name) { return AVATAR_COLORS[name.charCodeAt(0) % AVATAR_COLORS.length]; }

function avatarHTML(name, size) {
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${avatarColor(name)};font-size:${Math.round(size*0.35)}px">${getInitials(name)}</div>`;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

async function dbGet(name) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/hydration?name=eq.${encodeURIComponent(name)}&select=*`, { headers: HEADERS });
  const data = await res.json();
  return data[0] || null;
}

async function dbUpsert(row) {
  await fetch(`${SUPABASE_URL}/rest/v1/hydration`, {
    method: "POST",
    headers: { ...HEADERS, "Prefer": "resolution=merge-duplicates" },
    body: JSON.stringify(row)
  });
}

async function dbAll() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/hydration?select=*`, { headers: HEADERS });
  return await res.json();
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab")[view === "log" ? 0 : 1].classList.add("active");
  document.getElementById("view-log").classList.toggle("hidden", view !== "log");
  document.getElementById("view-leaderboard").classList.toggle("hidden", view !== "leaderboard");
  if (view === "leaderboard") renderLeaderboard();
  if (view === "log") renderLog();
}

function renderLog() {
  const el = document.getElementById("view-log");
  if (!userName) {
    el.innerHTML = `
      <div class="card join-card">
        <div class="icon">💧</div>
        <h2>Join the Challenge</h2>
        <p>Track your daily water intake April 14–18 and compete with colleagues across the district. Aim for 8 glasses a day!</p>
        <input type="text" id="name-input" placeholder="Your full name" onkeydown="if(event.key==='Enter')handleJoin()">
        <div class="error hidden" id="name-error"></div>
        <button class="btn-join" onclick="handleJoin()">Join the Challenge</button>
      </div>`;
    return;
  }

  const total = getTotal(myRow);
  const badge = getBadge(total);

  let daysHTML = DAYS.map(({ key, label }) => {
    const val = Number(myRow[key]) || 0;
    const pct = Math.min(100, Math.round((val / GOAL) * 100));
    const met = val >= GOAL;
    const fillColor = met ? "#1d9e75" : "#378add";
    const dotsHTML = Array.from({ length: GOAL }, (_, i) =>
      `<div class="dot" onclick="updateGlasses('${key}',${i+1})" style="background:${i < val ? fillColor : '#f1efe8'};border-color:${i < val ? 'transparent' : 'rgba(0,0,0,0.12)'}"></div>`
    ).join("");
    return `
      <div class="card">
        <div class="day-header">
          <span class="day-label">${label}</span>
          <div class="day-meta">
            ${met ? `<span class="goal-met">Goal met!</span>` : ""}
            <span>${val} / ${GOAL} glasses</span>
          </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${fillColor}"></div></div>
        <div class="dots-row">
          <button class="btn-inc" onclick="updateGlasses('${key}',${val-1})" ${val<=0?"disabled":""}>−</button>
          <div class="dots">${dotsHTML}</div>
          <button class="btn-inc" onclick="updateGlasses('${key}',${val+1})">+</button>
        </div>
      </div>`;
  }).join("");

  el.innerHTML = `
    <div class="card" style="margin-bottom:1.25rem">
      <div class="profile-row">
        ${avatarHTML(userName, 44)}
        <div class="profile-info">
          <div class="name">${userName}</div>
          <div class="meta">${total} glasses total</div>
        </div>
        ${badge ? `<div class="badge" style="background:${badge.bg};color:${badge.color}">${badge.label}</div>` : ""}
      </div>
    </div>
    ${daysHTML}
    <button class="btn-switch" onclick="handleSwitchUser()">Switch user</button>`;
}

async function handleJoin() {
  const input = document.getElementById("name-input");
  const errEl = document.getElementById("name-error");
  const name = input.value.trim();
  if (!name || name.length < 2) {
    errEl.textContent = "Please enter your full name.";
    errEl.classList.remove("hidden");
    return;
  }
  errEl.classList.add("hidden");
  const btn = document.querySelector(".btn-join");
  btn.textContent = "Joining..."; btn.disabled = true;
  try {
    await dbUpsert({ name, mon:0, tue:0, wed:0, thu:0, fri:0, updated_at: new Date().toISOString() });
    localStorage.setItem("redhawk-username", name);
    userName = name;
    const row = await dbGet(name);
    myRow = row || {};
    renderLog();
  } catch(e) {
    errEl.textContent = "Error connecting. Please try again.";
    errEl.classList.remove("hidden");
    btn.textContent = "Join the Challenge"; btn.disabled = false;
  }
}

async function updateGlasses(dayKey, val) {
  const clamped = Math.max(0, Math.min(20, val));
  myRow = { ...myRow, [dayKey]: clamped, name: userName, updated_at: new Date().toISOString() };
  renderLog();
  try {
    await dbUpsert(myRow);
    showToast("Saved!");
  } catch(e) { showToast("Error saving."); }
}

function handleSwitchUser() {
  localStorage.removeItem("redhawk-username");
  userName = ""; myRow = {};
  renderLog();
}

async function renderLeaderboard() {
  const el = document.getElementById("view-leaderboard");
  el.innerHTML = `
    <div class="lb-header"><span>District Leaderboard</span><button class="btn-refresh" onclick="renderLeaderboard()">Refresh</button></div>
    <div class="loading">Loading leaderboard...</div>`;
  try {
    const rows = await dbAll();
    const sorted = (rows || []).sort((a, b) => getTotal(b) - getTotal(a));
    const medals = ["🥇","🥈","🥉"];
    if (sorted.length === 0) {
      el.innerHTML = `<div class="lb-header"><span>District Leaderboard</span><button class="btn-refresh" onclick="renderLeaderboard()">Refresh</button></div><div class="loading">No participants yet. Be the first to join!</div>`;
      return;
    }
    const rowsHTML = sorted.map((row, idx) => {
      const name = row.name;
      const total = getTotal(row);
      const isMe = name === userName;
      const daysHTML = DAYS.map(({ key, label }) => {
        const d = Number(row[key]) || 0;
        const bg = d >= GOAL ? "#1d9e75" : d > 0 ? "#378add" : "#f1efe8";
        return `<div class="lb-day" style="background:${bg}" title="${label}: ${d} glasses"></div>`;
      }).join("");
      const barW = Math.min(100, Math.round((total / (GOAL * 5)) * 100));
      const barColor = isMe ? "#185fa5" : "#888780";
      return `
        <div class="card ${isMe ? "highlight" : ""}" style="margin-bottom:8px">
          <div class="lb-row">
            <div class="lb-rank ${idx >= 3 ? "num" : ""}">${idx < 3 ? medals[idx] : "#"+(idx+1)}</div>
            ${avatarHTML(name, 36)}
            <div class="lb-info">
              <div class="lb-name">${name}${isMe ? " (you)" : ""}</div>
              <div class="lb-days">${daysHTML}</div>
            </div>
            <div class="lb-total"><div class="num">${total}</div><div class="lbl">glasses</div></div>
          </div>
          <div class="lb-bar"><div class="lb-bar-fill" style="width:${barW}%;background:${barColor}"></div></div>
        </div>`;
    }).join("");
    el.innerHTML = `
      <div class="lb-header"><span>District Leaderboard</span><button class="btn-refresh" onclick="renderLeaderboard()">Refresh</button></div>
      ${rowsHTML}
      <div class="legend">Green = goal met · Blue = partial · Gray = no log</div>`;
  } catch(e) {
    el.innerHTML = `<div class="lb-header"><span>District Leaderboard</span><button class="btn-refresh" onclick="renderLeaderboard()">Refresh</button></div><div class="loading">Error loading. Please refresh.</div>`;
  }
}

// Init
if (userName) {
  dbGet(userName).then(row => { myRow = row || {}; renderLog(); });
} else {
  renderLog();
}
</script>
</body>
</html>
